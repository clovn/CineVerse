name: CineVerse CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  notify-start:
    name: Telegram Start Notification
    runs-on: ubuntu-latest
    steps:
      - name: Send Start Notification
        env:
          MSG_TEXT: |
            🚀 *CineVerse CI/CD Pipeline Started*

            *Triggered by:* ${{ github.actor }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            *Message:* ${{ github.event.head_commit.message || 'Triggered manually/PR' }}
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "parse_mode=Markdown" \
              --data-urlencode "text=$MSG_TEXT"
          else
            echo "Telegram secrets not set, skipping start notification."
          fi

  lint-kotlin:
    name: Lint & Code Quality (Kotlin)
    runs-on: ubuntu-latest
    outputs:
      errors: ${{ steps.count.outputs.errors }}
      warnings: ${{ steps.count.outputs.warnings }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Run Kotlin Linter
        run: |
          echo "Running Kotlin Linter checks..."
          ./gradlew check --continue || echo "Linting finished with warnings/errors"

      - name: Gather Kotlin Lint Reports
        if: always()
        run: |
          mkdir -p kotlin-reports
          find . -type f -path "*/build/reports/lint-results*" -exec cp {} kotlin-reports/ \; 2>/dev/null || true

      - name: Count Lint Issues
        id: count
        if: always()
        run: |
          ERRORS=0
          WARNINGS=0
          for xml in kotlin-reports/*.xml; do
            if [ -f "$xml" ]; then
              ERRORS=$((ERRORS + $(grep -oi 'severity="error"' "$xml" | wc -l || echo 0)))
              WARNINGS=$((WARNINGS + $(grep -oi 'severity="warning"' "$xml" | wc -l || echo 0)))
            fi
          done
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT

      - name: Upload Kotlin Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-lint-reports
          path: kotlin-reports/
          if-no-files-found: ignore
          retention-days: 7

  build-android:
    name: Build & Distribute Android
    runs-on: ubuntu-latest
    needs: lint-kotlin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android Debug APK
        run: ./gradlew :androidApp:app:assembleDebug

      # Upload APK to Github Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CineVerse-Android-Debug
          path: androidApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # Upload to Firebase App Distribution (Only on master branch)
      # requires secrets.FIREBASE_ANDROID_APP_ID and secrets.FIREBASE_SERVICE_ACCOUNT_JSON
      - name: Upload to Firebase App Distribution
        if: github.ref == 'refs/heads/master' && hashFiles('**/google-services.json') != ''
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: androidApp/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build & Distribute iOS
    runs-on: macos-latest
    needs: lint-kotlin
    outputs:
      errors: ${{ steps.count.outputs.errors }}
      warnings: ${{ steps.count.outputs.warnings }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Kotlin Native Compiler (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        id: count
        run: |
          swiftlint lint iosApp/ > swiftlint-output.txt || true
          ERRORS=$(grep -c ": error:" swiftlint-output.txt || true)
          WARNINGS=$(grep -c ": warning:" swiftlint-output.txt || true)
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          
          swiftlint lint iosApp/ --reporter html --output swiftlint-report.html || true
          
          if [ "$ERRORS" -gt 0 ]; then
            echo "SwiftLint found errors!"
            exit 1
          fi

      - name: Upload SwiftLint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swiftlint-report
          path: swiftlint-report.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Compile Kotlin Multiplatform iOS Target
        run: ./gradlew compileKotlinIosSimulatorArm64

      - name: Build iOS SwiftUI Client (Simulator)
        run: |
          xcodebuild -project iosApp.xcodeproj -scheme iosApp -sdk iphonesimulator -configuration Debug build

  notify-end:
    name: Telegram End Notification
    runs-on: ubuntu-latest
    needs: [lint-kotlin, build-android, build-ios]
    if: always()
    permissions:
      actions: read
      contents: read
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.build-android.result }}" = "success" ] && [ "${{ needs.build-ios.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "icon=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "icon=❌" >> $GITHUB_OUTPUT
          fi

      - name: Fetch Artifact Links
        id: artifacts
        run: |
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts")
          
          LINKS=$(echo "$RESPONSE" | jq -r '.artifacts[] | "• [\(.name)](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/\(.id)) (Size: \((.size_in_bytes / 1048576 * 100 | round / 100)) MB)"' || echo "")
          
          if [ -z "$LINKS" ]; then
            LINKS="No artifacts available."
          fi
          
          echo "links<<EOF" >> $GITHUB_OUTPUT
          echo "$LINKS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Format Warnings
        id: warnings
        run: |
          KOTLIN_ERR="${{ needs.lint-kotlin.outputs.errors }}"
          KOTLIN_WARN="${{ needs.lint-kotlin.outputs.warnings }}"
          SWIFT_ERR="${{ needs.build-ios.outputs.errors }}"
          SWIFT_WARN="${{ needs.build-ios.outputs.warnings }}"
          
          KOTLIN_ERR=${KOTLIN_ERR:-0}
          KOTLIN_WARN=${KOTLIN_WARN:-0}
          SWIFT_ERR=${SWIFT_ERR:-0}
          SWIFT_WARN=${SWIFT_WARN:-0}
          
          MSG="• *Kotlin:* $KOTLIN_ERR errors, $KOTLIN_WARN warnings\n• *Swift:* $SWIFT_ERR errors, $SWIFT_WARN warnings"
          
          if [ "$KOTLIN_ERR" -gt 0 ] || [ "$SWIFT_ERR" -gt 0 ]; then
            MSG="⚠️ *Lint Errors Found:*\n$MSG"
          else
            MSG="✨ *Linter Results:*\n$MSG"
          fi
          
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send End Notification
        env:
          MSG_TEXT: |
            ${{ steps.status.outputs.icon }} *CineVerse CI/CD Pipeline Finished*

            *Status:* ${{ steps.status.outputs.status }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            *Message:* ${{ github.event.head_commit.message || 'Triggered manually/PR' }}

            ${{ steps.warnings.outputs.summary }}

            📦 *Artifacts:*
            ${{ steps.artifacts.outputs.links }}

            🔗 [View Run Details on GitHub](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "parse_mode=Markdown" \
              --data-urlencode "text=$MSG_TEXT"
          else
            echo "Telegram secrets not set, skipping end notification."
          fi

      - name: Download Kotlin Lint Reports
        if: steps.status.outputs.status == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kotlin-lint-reports
          path: kotlin-reports
        continue-on-error: true

      - name: Download SwiftLint Report
        if: steps.status.outputs.status == 'success'
        uses: actions/download-artifact@v4
        with:
          name: swiftlint-report
          path: swiftlint-report
        continue-on-error: true

      - name: Send Reports to Telegram
        if: steps.status.outputs.status == 'success'
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            if [ -d "kotlin-reports" ]; then
              for file in kotlin-reports/*; do
                if [ -f "$file" ]; then
                  echo "Sending Kotlin report: $file"
                  curl -s -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -F document=@"$file" "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
                fi
              done
            fi
            if [ -f "swiftlint-report/swiftlint-report.html" ]; then
              echo "Sending SwiftLint report"
              curl -s -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -F document=@"swiftlint-report/swiftlint-report.html" "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
            fi
          else
            echo "Telegram secrets not set, skipping sending reports."
          fi

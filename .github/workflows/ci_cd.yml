name: CineVerse CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch: # Allows manual run trigger

jobs:
  lint-kotlin:
    name: Lint & Code Quality (Kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Run Kotlin Linter
        run: |
          echo "Running Kotlin Linter checks..."
          ./gradlew check --continue || echo "Linting finished with warnings/errors"

  build-android:
    name: Build & Distribute Android
    runs-on: ubuntu-latest
    needs: lint-kotlin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android Debug APK
        run: ./gradlew :androidApp:app:assembleDebug

      # Upload APK to Github Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CineVerse-Android-Debug
          path: androidApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # Upload to Firebase App Distribution (Only on master branch)
      # requires secrets.FIREBASE_ANDROID_APP_ID and secrets.FIREBASE_SERVICE_ACCOUNT_JSON
      - name: Upload to Firebase App Distribution
        if: github.ref == 'refs/heads/master' && hashFiles('**/google-services.json') != ''
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: androidApp/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build & Distribute iOS
    runs-on: macos-latest
    needs: lint-kotlin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Kotlin Native Compiler (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            echo "Running SwiftLint..."
            swiftlint lint iosApp/
          else
            echo "SwiftLint not installed on runner, skipping."
          fi

      - name: Compile Kotlin Multiplatform iOS Target
        run: ./gradlew compileKotlinIosSimulatorArm64

      - name: Build iOS SwiftUI Client (Simulator)
        run: |
          xcodebuild -project iosApp/iosApp.xcodeproj -scheme iosApp -sdk iphonesimulator -configuration Debug build

      # Template for Firebase App Distribution on iOS:

name: CineVerse CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  notify-start:
    name: Telegram Start Notification
    runs-on: ubuntu-latest
    steps:
      - name: Send Start Notification
        env:
          MSG_TEXT: |
            🚀 *CineVerse CI/CD Pipeline Started*

            *Triggered by:* ${{ github.actor }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            *Message:* ${{ github.event.head_commit.message || 'Triggered manually/PR' }}
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "parse_mode=Markdown" \
              --data-urlencode "text=$MSG_TEXT"
          else
            echo "Telegram secrets not set, skipping start notification."
          fi

  lint-kotlin:
    name: Lint & Code Quality (Kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Run Kotlin Linter
        run: |
          echo "Running Kotlin Linter checks..."
          ./gradlew check --continue || echo "Linting finished with warnings/errors"

      - name: Gather Kotlin Lint Reports
        if: always()
        run: |
          mkdir -p kotlin-reports
          find . -type f -path "*/build/reports/lint-results*" -exec cp {} kotlin-reports/ \; 2>/dev/null || true

      - name: Upload Kotlin Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-lint-reports
          path: kotlin-reports/
          if-no-files-found: ignore
          retention-days: 7

  build-android:
    name: Build & Distribute Android
    runs-on: ubuntu-latest
    needs: lint-kotlin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android Debug APK
        run: ./gradlew :androidApp:app:assembleDebug

      # Upload APK to Github Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CineVerse-Android-Debug
          path: androidApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # Upload to Firebase App Distribution (Only on master branch)
      # requires secrets.FIREBASE_ANDROID_APP_ID and secrets.FIREBASE_SERVICE_ACCOUNT_JSON
      - name: Upload to Firebase App Distribution
        if: github.ref == 'refs/heads/master' && hashFiles('**/google-services.json') != ''
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: androidApp/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build & Distribute iOS
    runs-on: macos-latest
    needs: lint-kotlin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Kotlin Native Compiler (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint iosApp/ --reporter html --output swiftlint-report.html

      - name: Upload SwiftLint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swiftlint-report
          path: swiftlint-report.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Compile Kotlin Multiplatform iOS Target
        run: ./gradlew compileKotlinIosSimulatorArm64

      - name: Build iOS SwiftUI Client (Simulator)
        run: |
          xcodebuild -project iosApp.xcodeproj -scheme iosApp -sdk iphonesimulator -configuration Debug build

  notify-end:
    name: Telegram End Notification
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: always()
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.build-android.result }}" = "success" ] && [ "${{ needs.build-ios.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "icon=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "icon=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send End Notification
        env:
          MSG_TEXT: |
            ${{ steps.status.outputs.icon }} *CineVerse CI/CD Pipeline Finished*

            *Status:* ${{ steps.status.outputs.status }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            *Run Details & Artifacts:* [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "parse_mode=Markdown" \
              --data-urlencode "text=$MSG_TEXT"
          else
            echo "Telegram secrets not set, skipping end notification."
          fi

      - name: Download Kotlin Lint Reports
        if: steps.status.outputs.status == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kotlin-lint-reports
          path: kotlin-reports
        continue-on-error: true

      - name: Download SwiftLint Report
        if: steps.status.outputs.status == 'success'
        uses: actions/download-artifact@v4
        with:
          name: swiftlint-report
          path: swiftlint-report
        continue-on-error: true

      - name: Send Reports to Telegram
        if: steps.status.outputs.status == 'success'
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            # Send Kotlin linter reports if they exist
            if [ -d "kotlin-reports" ]; then
              for file in kotlin-reports/*; do
                if [ -f "$file" ]; then
                  echo "Sending Kotlin report: $file"
                  curl -s -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -F document=@"$file" "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
                fi
              done
            fi
            # Send SwiftLint report if it exists
            if [ -f "swiftlint-report/swiftlint-report.html" ]; then
              echo "Sending SwiftLint report"
              curl -s -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -F document=@"swiftlint-report/swiftlint-report.html" "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
            fi
          else
            echo "Telegram secrets not set, skipping sending reports."
          fi

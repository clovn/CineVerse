name: iosApp
options:
  bundleIdPrefix: com.cineverse
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.27.0
targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iosApp
        excludes:
          - "project.yml"
          - "Info.plist"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.cineverse.iosApp
      INFOPLIST_FILE: iosApp/Info.plist
      FRAMEWORK_SEARCH_PATHS: $(inherited) "$BUILT_PRODUCTS_DIR"
      OTHER_LDFLAGS: $(inherited) -framework shared -lsqlite3
    dependencies:
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
    preBuildScripts:
      - name: Compile Kotlin Multiplatform Framework
        script: |
          cd "$SRCROOT"
          if [ "$CI" != "true" ] && [ -d "/Applications/Android Studio.app/Contents/jbr/Contents/Home" ]; then
            export JAVA_HOME="/Applications/Android Studio.app/Contents/jbr/Contents/Home"
          fi
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        shell: /bin/sh
